name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        # Also generates src/routeTree.gen.ts (gitignored) needed by typecheck.
        run: bun run build

      - name: Lint (oxlint)
        run: bun run lint

      - name: Format check (prettier)
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Unit & component tests (vitest)
        run: bun run test

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run e2e tests
        # NOTE: no backend in CI — the happy-path menu test is skipped; the
        # home + invalid-token flows pass (any loader error renders the error UI).
        run: bun run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
